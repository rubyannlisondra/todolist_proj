{% extends 'todos/base.html' %}
{% block content %}
<div class="topbar">
    <div>
        <h4>Trash</h4>
        <p class="text-muted mb-0" style="font-size:0.9rem;">Deleted tasks — restore or permanently delete</p>
    </div>
</div>

<div class="card">
    <div class="card-header fw-bold text-white" style="background: linear-gradient(135deg, #c0392b, #e05c5c);">
        <i class="bi bi-trash me-2"></i>Trash
    </div>
    <div class="card-body p-0">
        {% for todo in todos %}
        <div class="d-flex justify-content-between align-items-center px-4 py-3 border-bottom">
            <div>
                <p class="mb-0 fw-semibold text-decoration-line-through text-muted">{{ todo.title }}</p>
                <small class="text-muted">
                    Deleted: {{ todo.deleted_at|date:"M d, Y H:i" }}
                </small>
            </div>
            <div class="d-flex gap-2">
                <a href="{% url 'restore_todo' todo.pk %}" class="btn btn-sm btn-main">
                    <i class="bi bi-arrow-counterclockwise me-1"></i> Restore
                </a>
                <a href="{% url 'permanent_delete' todo.pk %}" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-trash me-1"></i> Delete Forever
                </a>
            </div>
        </div>
        {% empty %}
        <div class="text-center p-5">
            <i class="bi bi-trash" style="font-size:3rem; color:#a8cce0;"></i>
            <p class="mt-3 text-muted">Trash is empty!</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
