{% extends 'todos/base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-4">

        <div class="text-center mb-4">
            <h2 style="color:#2d4a5f; font-weight:700;">📝 Taskly</h2>
            <p class="text-muted">Sign in to manage your tasks</p>
        </div>

        <div class="card shadow-sm">
            <div class="card-header fw-bold text-white text-center" style="background: linear-gradient(135deg, #2d4a5f, #6a9bbf);">
                <i class="bi bi-box-arrow-in-right me-2"></i>Welcome Back
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label text-muted" style="font-size:0.85rem;">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}"
                               name="{{ field.html_name }}"
                               class="form-control"
                               {% if field.value %}value="{{ field.value }}"{% endif %}>
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-main w-100 mt-2">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Login
                    </button>
                </form>

                <hr style="border-color:#ddeaf3;">
                <p class="text-center mb-0 text-muted" style="font-size:0.88rem;">
                    Don't have an account?
                    <a href="{% url 'register' %}" style="color:#2d4a5f; font-weight:600;">Register here</a>
                </p>
            </div>
        </div>

        <p class="text-center mt-3 text-muted" style="font-size:0.78rem;">
            Taskly &copy; 2026 — Stay organized, stay productive.
        </p>

    </div>
</div>
{% endblock %}
