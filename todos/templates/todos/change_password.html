{% extends 'todos/base.html' %}
{% block content %}
<div class="topbar">
    <div>
        <h4>Change Password</h4>
        <p class="text-muted mb-0" style="font-size:0.9rem;">Update your account password</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header fw-bold text-white" style="background: linear-gradient(135deg, #2d4a5f, #6a9bbf);">
                <i class="bi bi-shield-lock me-2"></i>Change Password
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{% url 'change_password' %}">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label text-muted" style="font-size:0.85rem;">{{ field.label }}</label>
                        <input type="password"
                               name="{{ field.html_name }}"
                               class="form-control">
                        {% if field.help_text %}
                            <div class="form-text text-muted" style="font-size:0.78rem;">{{ field.help_text }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-main w-100 mt-2">
                        <i class="bi bi-shield-check me-1"></i> Update Password
                    </button>
                    <a href="{% url 'profile' %}" class="btn w-100 mt-2" style="border-radius:10px; border:1.5px solid #6a9bbf; color:#2d4a5f;">
                        Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
