{% extends "admin/base.html" %}

{% block title %}Taskly{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">📝 Taskly</a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        --primary: #2d4a5f;
        --secondary: #6a9bbf;
        --light: #a8cce0;
        --pale: #f5f5f0;
        --accent: #ddeaf3;
    }
    #header {
        background: linear-gradient(135deg, #2d4a5f, #6a9bbf) !important;
        color: #fff !important;
        padding: 12px 20px;
        box-shadow: 0 2px 10px rgba(45,74,95,0.3);
    }
    #header a:link, #header a:visited {
        color: #fff !important;
    }
    #branding h1 {
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: #fff !important;
    }
    #branding h1 a {
        color: #fff !important;
        text-decoration: none;
    }
    #user-tools {
        color: rgba(255,255,255,0.85) !important;
        font-size: 0.85rem;
    }
    #user-tools a {
        color: #fff !important;
        border-bottom: 1px solid rgba(255,255,255,0.4);
        padding-bottom: 1px;
    }
    #user-tools a:hover {
        color: #a8cce0 !important;
        border-bottom-color: #a8cce0;
    }
    div.breadcrumbs {
        background: #ddeaf3 !important;
        color: #2d4a5f !important;
        padding: 10px 20px;
        font-size: 0.88rem;
        border-bottom: 1px solid #c5dcea;
    }
    div.breadcrumbs a {
        color: #2d4a5f !important;
        font-weight: 600;
    }
    div.breadcrumbs a:hover {
        color: #6a9bbf !important;
    }
    body {
        background-color: #f0f4f8 !important;
        font-family: 'Segoe UI', sans-serif !important;
        color: #2d4a5f !important;
    }
    #nav-sidebar {
        background: #fff !important;
        border-right: 1px solid #ddeaf3 !important;
    }
    #nav-sidebar .current-app .section:link,
    #nav-sidebar .current-app .section:visited {
        color: #2d4a5f !important;
        font-weight: 700;
    }
    #content {
        background: #f0f4f8 !important;
        padding: 20px !important;
    }
    #content h1 {
        color: #2d4a5f !important;
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 20px;
        border-bottom: 2px solid #ddeaf3;
        padding-bottom: 10px;
    }
    .dashboard #content {
        background: #f0f4f8 !important;
    }
    .module {
        background: #fff !important;
        border-radius: 12px !important;
        border: none !important;
        box-shadow: 0 4px 15px rgba(45,74,95,0.08) !important;
        margin-bottom: 20px !important;
        overflow: hidden;
    }

    .module h2, .module caption {
        background: linear-gradient(135deg, #2d4a5f, #6a9bbf) !important;
        color: #fff !important;
        padding: 12px 16px !important;
        font-size: 0.95rem !important;
        font-weight: 600 !important;
        border-radius: 12px 12px 0 0 !important;
        letter-spacing: 0.3px;
    }

    .module table {
        width: 100%;
    }
    #content-main .app-list .app-heading {
        background: linear-gradient(135deg, #2d4a5f, #6a9bbf) !important;
        color: #fff !important;
        padding: 12px 16px;
        border-radius: 12px 12px 0 0;
        font-weight: 600;
    }
    a:link, a:visited {
        color: #2d4a5f !important;
    }
    a:hover {
        color: #6a9bbf !important;
    }
    .button, input[type=submit], input[type=button],
    .submit-row input, a.button {
        background: linear-gradient(135deg, #2d4a5f, #6a9bbf) !important;
        color: #fff !important;
        border: none !important;
        border-radius: 8px !important;
        padding: 8px 16px !important;
        font-size: 0.88rem !important;
        cursor: pointer !important;
        transition: all 0.2s ease !important;
    }
    .button:hover, input[type=submit]:hover {
        background: linear-gradient(135deg, #6a9bbf, #2d4a5f) !important;
        box-shadow: 0 4px 12px rgba(45,74,95,0.3) !important;
        transform: translateY(-1px) !important;
    }
    .button.default, input[type=submit].default {
        background: linear-gradient(135deg, #2d4a5f, #6a9bbf) !important;
    }

    /* ── Delete Button ── */
    .deletelink, a.deletelink {
        background: linear-gradient(135deg, #c0392b, #e05c5c) !important;
        color: #fff !important;
        border-radius: 8px !important;
        padding: 8px 16px !important;
        text-decoration: none !important;
    }

    .deletelink:hover {
        background: linear-gradient(135deg, #e05c5c, #c0392b) !important;
        color: #fff !important;
    }

    /* ── Tables ── */
    #result_list {
        border-radius: 12px !important;
        overflow: hidden !important;
        box-shadow: 0 4px 15px rgba(45,74,95,0.08) !important;
        background: #fff !important;
        border: none !important;
    }

    #result_list thead th {
        background: #ddeaf3 !important;
        color: #2d4a5f !important;
        font-weight: 600 !important;
        padding: 12px 16px !important;
        border-bottom: 2px solid #a8cce0 !important;
        font-size: 0.85rem !important;
    }

    #result_list thead th a:link,
    #result_list thead th a:visited {
        color: #2d4a5f !important;
    }

    #result_list tbody tr {
        border-bottom: 1px solid #f0f4f8 !important;
        transition: background 0.15s ease;
    }

    #result_list tbody tr:hover {
        background: #f0f7fc !important;
    }

    #result_list tbody td {
        padding: 10px 16px !important;
        font-size: 0.88rem !important;
        color: #2d4a5f !important;
        border: none !important;
    }

    #result_list tbody tr:nth-child(even) {
        background: #fafcfe !important;
    }

    /* ── Pagination ── */
    .paginator {
        background: #fff !important;
        border-top: 1px solid #ddeaf3 !important;
        padding: 10px 16px !important;
        border-radius: 0 0 12px 12px !important;
        font-size: 0.85rem !important;
        color: #2d4a5f !important;
    }

    .paginator a {
        background: #ddeaf3 !important;
        color: #2d4a5f !important;
        padding: 4px 10px !important;
        border-radius: 6px !important;
        margin: 0 2px !important;
        text-decoration: none !important;
    }

    .paginator a:hover {
        background: #6a9bbf !important;
        color: #fff !important;
    }

    /* ── Forms ── */
    .form-row {
        padding: 10px 0 !important;
        border-bottom: 1px solid #f0f4f8 !important;
    }

    input[type=text], input[type=password], input[type=email],
    input[type=url], input[type=number], textarea, select {
        border: 1.5px solid #ddeaf3 !important;
        border-radius: 8px !important;
        padding: 8px 12px !important;
        font-size: 0.88rem !important;
        color: #2d4a5f !important;
        background: #fafcfe !important;
        transition: border-color 0.2s ease, box-shadow 0.2s ease !important;
    }

    input[type=text]:focus, input[type=password]:focus,
    input[type=email]:focus, textarea:focus, select:focus {
        border-color: #6a9bbf !important;
        box-shadow: 0 0 0 3px rgba(106,155,191,0.2) !important;
        outline: none !important;
    }

    /* ── Fieldsets ── */
    fieldset {
        background: #fff !important;
        border-radius: 12px !important;
        border: 1px solid #ddeaf3 !important;
        padding: 16px !important;
        margin-bottom: 16px !important;
        box-shadow: 0 2px 10px rgba(45,74,95,0.05) !important;
    }

    fieldset h2 {
        background: #ddeaf3 !important;
        color: #2d4a5f !important;
        border-radius: 8px !important;
        padding: 8px 12px !important;
        font-size: 0.9rem !important;
        margin-bottom: 12px !important;
    }

    /* ── Messages / Alerts ── */
    .messagelist li {
        border-radius: 8px !important;
        padding: 10px 16px !important;
        margin-bottom: 8px !important;
        font-size: 0.88rem !important;
    }

    .messagelist li.success {
        background: #d4edda !important;
        color: #155724 !important;
        border-left: 4px solid #5aab7a !important;
    }

    .messagelist li.warning {
        background: #fff3cd !important;
        color: #856404 !important;
        border-left: 4px solid #e0a832 !important;
    }

    .messagelist li.error {
        background: #f8d7da !important;
        color: #721c24 !important;
        border-left: 4px solid #e05c5c !important;
    }
    .submit-row {
        background: #ddeaf3 !important;
        border-radius: 0 0 12px 12px !important;
        padding: 12px 16px !important;
        border-top: 1px solid #a8cce0 !important;
    }
    #toolbar {
        background: #fff !important;
        border-bottom: 1px solid #ddeaf3 !important;
        padding: 10px 16px !important;
        border-radius: 12px 12px 0 0 !important;
    }
    #searchbar {
        border: 1.5px solid #ddeaf3 !important;
        border-radius: 8px !important;
        padding: 7px 12px !important;
        font-size: 0.88rem !important;
        color: #2d4a5f !important;
    }
    #searchbar:focus {
        border-color: #6a9bbf !important;
        box-shadow: 0 0 0 3px rgba(106,155,191,0.2) !important;
        outline: none !important;
    }
    #changelist-filter {
        background: #fff !important;
        border-radius: 12px !important;
        border: none !important;
        box-shadow: 0 4px 15px rgba(45,74,95,0.08) !important;
        padding: 0 !important;
        overflow: hidden !important;
    }
    #changelist-filter h2 {
        background: linear-gradient(135deg, #2d4a5f, #6a9bbf) !important;
        color: #fff !important;
        padding: 12px 16px !important;
        font-size: 0.9rem !important;
        font-weight: 600 !important;
    }
    #changelist-filter h3 {
        color: #2d4a5f !important;
        font-size: 0.85rem !important;
        font-weight: 600 !important;
        padding: 8px 16px 4px !important;
        border-bottom: 1px solid #ddeaf3 !important;
    }
    #changelist-filter ul {
        padding: 8px 0 !important;
    }
    #changelist-filter li {
        padding: 4px 16px !important;
        font-size: 0.85rem !important;
    }
    #changelist-filter li a {
        color: #6a9bbf !important;
    }
    #changelist-filter li.selected a {
        color: #2d4a5f !important;
        font-weight: 600 !important;
    }
    body.login {
        background: linear-gradient(135deg, #2d4a5f, #6a9bbf) !important;
    }
    body.login #container {
        background: #fff !important;
        border-radius: 16px !important;
        box-shadow: 0 10px 40px rgba(45,74,95,0.3) !important;
        padding: 30px !important;
        max-width: 420px !important;
    }
    body.login #header {
        background: transparent !important;
        box-shadow: none !important;
        text-align: center !important;
        padding-bottom: 0 !important;
    }
    body.login #branding h1 {
        color: #2d4a5f !important;
        font-size: 1.6rem !important;
    }
    body.login #branding h1 a {
        color: #2d4a5f !important;
    }
    body.login .form-row label {
        color: #2d4a5f !important;
        font-weight: 600 !important;
        font-size: 0.85rem !important;
    }
    @media (max-width: 768px) {
        #header { padding: 10px 15px; }
        #content { padding: 15px !important; }
    }
</style>
{% endblock %}
